      .ship {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        fill: #58a6ff;
        animation: fly 14s linear infinite;
      }
      @keyframes fly {
        0%   { transform: translateX(820px); }
        100% { transform: translateX(-700px); }
      }
    </style>
  </defs>

